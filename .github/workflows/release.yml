name: release

# Build the single binary (frontend embedded) for linux amd64/arm64 and attach
# it to a GitHub Release whenever a v* tag is pushed. install.sh downloads these.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: cd web && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/wireguard-ui-linux-$arch" ./cmd/wireguard-ui
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wireguard-ui-linux-*
          generate_release_notes: true
