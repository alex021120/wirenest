name: release

# Build the single binary (frontend embedded) for linux amd64/arm64 and attach
# it to a GitHub Release whenever a v* tag is pushed. install.sh downloads these.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the full history + annotated tag object for notes

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build frontend
        run: cd web && npm ci && npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch \
              go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "dist/wireguard-ui-linux-$arch" ./cmd/wireguard-ui
          done

      # Use the annotated tag's message as the release notes, so each release
      # explains what changed. Falls back to a generic line if the tag is light.
      - name: Build release notes from tag
        run: |
          notes="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
          [ -n "$notes" ] || notes="WireNest ${GITHUB_REF_NAME}"
          printf '%s\n' "$notes" > release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wireguard-ui-linux-*
          body_path: release-notes.md
